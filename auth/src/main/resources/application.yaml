server:
  port: 8081

spring:
  application:
    name: tradex-auth
  datasource:
    url: ${TRADEX_DB_URL}
    username: ${TRADEX_DB_USERNAME}
    password: ${TRADEX_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: auth
    default-schema: auth
    baseline-on-migrate: true
    locations:
      - classpath:db/migration/auth
  data:
    redis:
      host: ${TRADEX_REDIS_HOST}
      port: ${TRADEX_REDIS_PORT}
      password: ${TRADEX_REDIS_PASSWORD}

tradex:
  auth:
    jwt:
      issuer: tradex
      access-ttl: PT15M
      refresh-ttl: P14D
      key-id: ${TRADEX_AUTH_JWT_KEY_ID}
      private-key-path: ${TRADEX_AUTH_JWT_PRIVATE_KEY_PATH}
      public-key-path: ${TRADEX_AUTH_JWT_PUBLIC_KEY_PATH}
