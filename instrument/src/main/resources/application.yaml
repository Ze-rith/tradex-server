server:
  port: 8084

spring:
  application:
    name: tradex-instrument
  datasource:
    url: ${TRADEX_DB_URL}
    username: ${TRADEX_DB_USERNAME}
    password: ${TRADEX_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: instrument
    default-schema: instrument
    locations:
      - classpath:db/migration/instrument
  data:
    redis:
      host: ${TRADEX_REDIS_HOST}
      port: ${TRADEX_REDIS_PORT}
      password: ${TRADEX_REDIS_PASSWORD}

tradex:
  auth:
    jwt:
      issuer: tradex
      public-key-pem: ${TRADEX_AUTH_JWT_PUBLIC_KEY}

  instrument:
    seed:
      enabled: true
      path: instruments/instruments-mock.json
      skipIfNotEmpty: true
